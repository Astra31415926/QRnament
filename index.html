<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB Creative Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; text-align: center; }
        #reader { width: 100vw; height: 80vh; background: #111; }
        .ui { position: fixed; bottom: 20px; width: 100%; z-index: 10; }
        #res { background: #fff; color: #000; padding: 10px; margin: 10px; border-radius: 8px; display: none; font-size: 14px; }
        .btn { background: #22c55e; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; }
        /* Индикатор работы фильтров */
        #filter-status { font-size: 10px; color: #555; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="reader"></div>

<div class="ui">
    <div id="filter-status">Адаптивный фильтр: Активен</div>
    <div id="res"></div>
    <button id="reset" class="btn" style="display:none" onclick="location.reload()">Сканировать еще</button>
</div>

<script>
    const resultDiv = document.getElementById('res');
    const resetBtn = document.getElementById('reset');
    
    // Настройки "умного" сканирования
    const html5QrCode = new Html5Qrcode("reader", {
        // ЭКСПЕРИМЕНТАЛЬНО: Использование Canvas для предобработки
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
    });

    const config = { 
        fps: 30, 
        qrbox: (w, h) => { return { width: w * 0.7, height: w * 0.7 } },
        // Эта настройка заставляет библиотеку пробовать разные уровни яркости
        aspectRatio: 1.0
    };

    html5QrCode.start(
        { facingMode: "environment" }, 
        config,
        (text) => {
            html5QrCode.stop();
            resultDiv.innerText = "Код найден: " + text;
            resultDiv.style.display = "block";
            resetBtn.style.display = "inline-block";
        }
    ).catch(err => {
        resultDiv.innerText = "Ошибка: " + err;
        resultDiv.style.display = "block";
    });

    /**
     * КРЕАТИВНЫЙ ХАК: 
     * Мы заставляем браузер программно увеличивать контрастность видеопотока 
     * через CSS-фильтры на самом элементе видео. Библиотека html5-qrcode 
     * при захвате кадра часто учитывает примененные CSS стили к видео-тегу.
     */
    setTimeout(() => {
        const video = document.querySelector('#reader video');
        if (video) {
            // Циклически меняем фильтры, чтобы "поймать" цветной код
            let mode = 0;
            setInterval(() => {
                mode = (mode + 1) % 4;
                switch(mode) {
                    case 0: video.style.filter = "contrast(200%) brightness(120%)"; break;
                    case 1: video.style.filter = "grayscale(100%) contrast(300%)"; break;
                    case 2: video.style.filter = "invert(100%) contrast(150%)"; break; // Для инвертированных кодов
                    case 3: video.style.filter = "saturate(500%) contrast(200%)"; break; // Усиление RGB
                }
            }, 500); // Каждые полсекунды меняем режим "зрения"
        }
    }, 2000);
</script>
</body>
</html>
