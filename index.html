<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB Logic Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #reader { width: 1px; height: 1px; opacity: 0; position: absolute; }
        .container { width: 100%; max-width: 400px; padding: 10px; box-sizing: border-box; }
        .ch-card { border: 1px solid #333; margin-bottom: 15px; background: #111; border-radius: 8px; overflow: hidden; }
        canvas { width: 100%; display: block; background: #000; }
        .label { padding: 5px 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: flex; justify-content: space-between; }
        .res { padding: 10px; background: #000; font-family: monospace; color: #0f0; min-height: 20px; border-top: 1px solid #222; word-break: break-all; }
        button { margin: 20px; padding: 15px 30px; border-radius: 30px; border: none; background: #2563eb; color: #fff; font-weight: bold; width: 80%; }
        .red { color: #ff4444; } .green { color: #44ff44; } .blue { color: #4444ff; }
    </style>
</head>
<body>

    <button id="startBtn" onclick="init()">ЗАПУСТИТЬ СКАНЕР</button>
    <div id="reader"></div>

    <div class="container">
        <div class="ch-card"><div class="label red"><span>RED Channel (Mono)</span></div><canvas id="cR"></canvas><div id="rR" class="res">...</div></div>
        <div class="ch-card"><div class="label green"><span>GREEN Channel (Mono)</span></div><canvas id="cG"></canvas><div id="rG" class="res">...</div></div>
        <div class="ch-card"><div class="label blue"><span>BLUE Channel (Mono)</span></div><canvas id="cB"></canvas><div id="rB" class="res">...</div></div>
    </div>

<script>
let html5QrCode;
const canvases = { R: document.getElementById('cR'), G: document.getElementById('cG'), B: document.getElementById('cB') };
const results = { R: document.getElementById('rR'), G: document.getElementById('rG'), B: document.getElementById('rB') };
const offscreen = document.createElement('canvas');

async function init() {
    document.getElementById('startBtn').style.display = 'none';
    html5QrCode = new Html5Qrcode("reader");
    await html5QrCode.start({ facingMode: "environment" }, { fps: 20 }, () => {});
    const video = document.querySelector('#reader video');
    // Частота 5 кадров в секунду (200мс)
    setInterval(() => process(video), 200);
}

function process(video) {
    if (video.readyState < 2) return;
    
    const w = video.videoWidth;
    const h = video.videoHeight;
    offscreen.width = w; offscreen.height = h;
    
    const ctx = offscreen.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(video, 0, 0, w, h);
    const imgData = ctx.getImageData(0, 0, w, h);
    
    // Индексы каналов в массиве RGBA: R=0, G=1, B=2
    const channels = { R: 0, G: 1, B: 2 };

    Object.keys(channels).forEach(ch => {
        const idx = channels[ch];
        const out = canvases[ch];
        out.width = w; out.height = h;
        const outCtx = out.getContext('2d');
        const outData = outCtx.createImageData(w, h);
        
        for (let i = 0; i < imgData.data.length; i += 4) {
            const pixelVal = imgData.data[i + idx]; 
            // Превращаем в монохром (R,R,R / G,G,G / B,B,B) для лучшего чтения
            outData.data[i] = outData.data[i+1] = outData.data[i+2] = pixelVal;
            outData.data[i+3] = 255; 
        }
        
        outCtx.putImageData(outData, 0, 0);

        // Сканируем текущий холст
        Html5Qrcode.scanImage(out, { showFps: false })
            .then(text => { 
                results[ch].innerText = text;
                results[ch].style.color = "#fff";
            })
            .catch(() => {});
    });
}
</script>
</body>
</html>
