<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB Mono Scanner Fix</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        #reader { display: none; }
        .container { display: flex; flex-direction: column; gap: 10px; align-items: center; padding: 10px; }
        .box { width: 90vw; max-width: 300px; border: 2px solid #333; border-radius: 10px; background: #111; overflow: hidden; }
        canvas { width: 100%; display: block; image-rendering: pixelated; }
        .res { padding: 8px; font-family: monospace; font-size: 14px; min-height: 1.2em; color: #0f0; border-top: 1px solid #222; }
        button { margin: 20px; padding: 15px 30px; border-radius: 30px; border: none; background: #2563eb; color: white; font-weight: bold; }
        .r-brd { border-color: #ff4444; } .g-brd { border-color: #44ff44; } .b-brd { border-color: #4444ff; }
    </style>
</head>
<body>

    <button id="startBtn" onclick="init()">ЗАПУСТИТЬ КАМЕРУ</button>
    <div id="reader"></div>

    <div class="container">
        <div class="box r-brd"><canvas id="cR"></canvas><div id="rR" class="res">---</div></div>
        <div class="box g-brd"><canvas id="cG"></canvas><div id="rG" class="res">---</div></div>
        <div class="box b-brd"><canvas id="cB"></canvas><div id="rB" class="res">---</div></div>
    </div>

<script>
let scanner;
const canvases = { R: document.getElementById('cR'), G: document.getElementById('cG'), B: document.getElementById('cB') };
const results = { R: document.getElementById('rR'), G: document.getElementById('rG'), B: document.getElementById('rB') };
const buffer = document.createElement('canvas');

async function init() {
    document.getElementById('startBtn').style.display = 'none';
    scanner = new Html5Qrcode("reader");
    await scanner.start({ facingMode: "environment" }, { fps: 20 }, () => {});
    
    const video = document.querySelector('#reader video');
    video.addEventListener('loadedmetadata', () => {
        process(video);
    });
    // Если видео уже загружено
    if (video.readyState >= 2) process(video);
}

function process(video) {
    const w = video.videoWidth;
    const h = video.videoHeight;
    if (w === 0) { requestAnimationFrame(() => process(video)); return; }

    buffer.width = w; buffer.height = h;
    const bCtx = buffer.getContext('2d', { willReadFrequently: true });
    
    // Цикл обработки 5 раз в секунду
    setInterval(() => {
        bCtx.drawImage(video, 0, 0, w, h);
        const img = bCtx.getImageData(0, 0, w, h);
        
        ['R', 'G', 'B'].forEach((ch, idx) => {
            const canvas = canvases[ch];
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            const out = ctx.createImageData(w, h);

            for (let i = 0; i < img.data.length; i += 4) {
                const val = img.data[i + idx]; // Берем R, G или B
                out.data[i] = out.data[i+1] = out.data[i+2] = val; // В ч/б
                out.data[i+3] = 255;
            }
            ctx.putImageData(out, 0, 0);

            // Попытка чтения
            Html5Qrcode.scanImage(canvas, { showFps: false })
                .then(text => { results[ch].innerText = text; })
                .catch(() => {});
        });
    }, 200); 
}
</script>
</body>
</html>
