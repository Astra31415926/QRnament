<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB Multi-Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; text-align: center; }
        #main-reader { display: none; }
        .grid { display: flex; flex-direction: column; gap: 10px; padding: 10px; align-items: center; }
        .channel-box { width: 180px; border: 2px solid #333; border-radius: 8px; overflow: hidden; background: #000; }
        canvas { width: 100%; display: block; image-rendering: pixelated; }
        .res-text { font-size: 12px; padding: 5px; min-height: 20px; background: #222; word-break: break-all; }
        .btn-reset { margin: 20px; padding: 15px 40px; border-radius: 30px; border: none; background: #ef4444; color: white; font-weight: bold; cursor: pointer; }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="main-reader"></div>

    <div class="grid">
        <div class="channel-box" style="border-color: #ff4444;">
            <canvas id="canvasR"></canvas>
            <div class="label">Red Channel</div>
            <div id="resR" class="res-text">...</div>
        </div>
        <div class="channel-box" style="border-color: #44ff44;">
            <canvas id="canvasG"></canvas>
            <div class="label">Green Channel</div>
            <div id="resG" class="res-text">...</div>
        </div>
        <div class="channel-box" style="border-color: #4444ff;">
            <canvas id="canvasB"></canvas>
            <div class="label">Blue Channel</div>
            <div id="resB" class="res-text">...</div>
        </div>
    </div>

    <button class="btn-reset" onclick="location.reload()">СБРОСИТЬ ВСЕ</button>

    <script>
        const html5QrCode = new Html5Qrcode("main-reader");
        const canvases = { R: document.getElementById('canvasR'), G: document.getElementById('canvasG'), B: document.getElementById('canvasB') };
        const results = { R: document.getElementById('resR'), G: document.getElementById('resG'), B: document.getElementById('resB') };
        const hiddenCanvas = document.createElement('canvas');

        async function start() {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10 }, () => {});
            const video = document.querySelector('#main-reader video');
            setInterval(() => processFrame(video), 200);
        }

        function processFrame(video) {
            const w = video.videoWidth / 4; // уменьшаем для скорости
            const h = video.videoHeight / 4;
            hiddenCanvas.width = w; hiddenCanvas.height = h;
            const ctx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(video, 0, 0, w, h);
            
            const frame = ctx.getImageData(0, 0, w, h);
            ['R', 'G', 'B'].forEach(ch => {
                const outCanvas = canvases[ch];
                outCanvas.width = w; outCanvas.height = h;
                const outCtx = outCanvas.getContext('2d');
                const outData = new ImageData(new Uint8ClampedArray(frame.data), w, h);
                
                for (let i = 0; i < outData.data.length; i += 4) {
                    if (ch === 'R') { outData.data[i+1] = 0; outData.data[i+2] = 0; }
                    if (ch === 'G') { outData.data[i] = 0; outData.data[i+2] = 0; }
                    if (ch === 'B') { outData.data[i] = 0; outData.data[i+1] = 0; }
                }
                
                outCtx.putImageData(outData, 0, 0);
                
                // Попытка распознавания из конкретного канала
                html5QrCode.scanImage(outCanvas)
                    .then(text => results[ch].innerText = text)
                    .catch(() => {}); 
            });
        }

        start();
    </script>
</body>
</html>
